name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go contracts and release smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Restore dependencies
        run: go mod download
      - name: Require formatted source
        run: test -z "$(gofmt -l .)"
      - name: Test with race detector
        env:
          GOPROXY: "off"
        run: go test -race ./...
      - name: Vet
        env:
          GOPROXY: "off"
        run: go vet ./...
      - name: Package and smoke release archives
        env:
          GOPROXY: "off"
        run: |
          version="$(awk -F'"' '/^[[:space:]]*Version = / {print $2}' internal/buildinfo/buildinfo.go)"
          go run ./scripts/release --version "$version" --commit "$GITHUB_SHA" --output "$RUNNER_TEMP/dist"
          cd "$RUNNER_TEMP/dist"
          sha256sum --check checksums.txt
          mkdir "$RUNNER_TEMP/tele-smoke"
          tar -xzf "tele_${version}_linux_amd64.tar.gz" -C "$RUNNER_TEMP/tele-smoke"
          test "$("$RUNNER_TEMP/tele-smoke/tele" --version)" = "tele version $version ($GITHUB_SHA)"

  macos:
    name: macOS contracts
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Restore dependencies
        run: go mod download
      - name: Test macOS paths and Keychain integration boundaries
        env:
          GOPROXY: "off"
        run: go test ./...

  lint-security:
    name: Lint and security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Restore dependencies and pinned tools
        run: |
          go mod download
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          go install github.com/securego/gosec/v2/cmd/gosec@v2.28.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Staticcheck
        env:
          GOPROXY: "off"
        run: staticcheck ./...
      - name: GolangCI-Lint
        env:
          GOPROXY: "off"
        run: golangci-lint run ./...
      - name: Gosec
        env:
          GOPROXY: "off"
        run: gosec -quiet ./...
      - name: Govulncheck
        run: govulncheck ./...

